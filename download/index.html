<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mein Fürstenwalde App laden</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://mein-fw.de/download">
  <style>
    :root {
      color-scheme: light;
      --blue:#0052d7;
      --yellow:#ffcd00;
      --text:#101018;
      --bg:#f6f9ff;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top left, #dceaff 0, transparent 35%), var(--bg);
      color:var(--text);
      padding:24px;
    }
    main {
      width:min(520px,100%);
      background:white;
      border:1px solid rgba(0,82,215,.18);
      border-radius:28px;
      box-shadow:0 18px 45px rgba(0,82,215,.14);
      padding:28px;
      text-align:center;
    }
    .badge {
      display:inline-block;
      padding:8px 16px;
      border-radius:999px;
      background:var(--yellow);
      color:var(--blue);
      font-weight:800;
      letter-spacing:.04em;
      font-size:14px;
      margin-bottom:18px;
    }
    h1 { margin:0 0 10px; font-size:32px; line-height:1.08; color:var(--blue); }
    p { margin:0 0 22px; font-size:17px; line-height:1.45; }
    a {
      display:block;
      text-decoration:none;
      border-radius:18px;
      padding:16px 18px;
      margin-top:12px;
      font-weight:800;
      font-size:18px;
    }
    .primary { background:var(--blue); color:white; }
    .secondary { background:#eef4ff; color:var(--blue); border:1px solid rgba(0,82,215,.2); }
    small { display:block; margin-top:18px; color:#5d6575; line-height:1.35; }
  </style>
  <script>
    (() => {
      const IOS_URL = 'https://apps.apple.com/app/id6775478256';
      const ANDROID_URL = 'https://play.google.com/store/apps/details?id=de.riccardopopp.fuerstenwalde';

      const ua = navigator.userAgent || navigator.vendor || window.opera || '';
      const isiOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(ua);

      if (isiOS) {
        window.location.replace(IOS_URL);
      } else if (isAndroid) {
        window.location.replace(ANDROID_URL);
      }
    })();
  </script>
</head>
<body>
  <main>
    <div class="badge">KOSTENLOS LADEN</div>
    <h1>Mein Fürstenwalde App</h1>
    <p>Wir leiten dich automatisch in den passenden Store weiter. Falls das nicht klappt, wähle deinen Store einfach hier aus.</p>
    <a class="primary" href="https://apps.apple.com/app/id6775478256">Im App Store laden</a>
    <a class="secondary" href="https://play.google.com/store/apps/details?id=de.riccardopopp.fuerstenwalde">Bei Google Play laden</a>
    <small>Auf dem Desktop werden beide Optionen angezeigt.</small>
  </main>
</body>
</html>
